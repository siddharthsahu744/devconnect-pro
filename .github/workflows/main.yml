name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Job 1: Frontend Build
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      run: |
        cd frontend
        npm install --legacy-peer-deps

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

  # Job 2: Backend Build
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8' # Aapke pom.xml me 1.8 specify hai
        distribution: 'temurin'
        cache: maven

    - name: Build Backend with Maven
      run: |
        cd devconnect/devconnect
        mvn clean package -DskipTests # Agar tests chalane hain to -DskipTests hata dena

  # Job 3: Docker Build (Optional - check karne ke liye ki Docker image ban rahi hai ya nahi)
  build-docker:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend] # Ye tabhi chalega jab upar ke dono jobs pass honge
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: |
        docker build -t devconnect-app .
